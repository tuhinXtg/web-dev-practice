<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture collage</title>
    <link rel="stylesheet" href="styles/collage.css">
</head>
<body>
    <header>
        <h1>My Picture collage</h1>
        <main>
            <section>
                <div class="row">
                    <img src="imagess/A.jpg" alt="">
                </div>                
                <div class="row">
                    <div>
                        <img src="imagess/B.jpg" alt="">
                    </div>
                    <div>
                        <img src="imagess/C.jpg" alt="">
                    </div>
                    <div class="vertical-collage">
                        <img src="imagess/D.jpg" alt="">
                        <img src="imagess/E.jpg" alt="">
                    </div>
                </div>  
                <div class="row">
                    <div>
                        <img src="imagess/F.jpg" alt="">
                    </div>
                    <div class="square-collage">
                        <img src="imagess/G.jpg" alt="">
                        <img src="imagess/G.jpg" alt="">
                        <img src="imagess/G.jpg" alt="">
                        <img src="imagess/G.jpg" alt="">
                    </div>
                    <div>
                        <img src="imagess/H.jpg" alt="">
                    </div>
                </div>              
            </section>
        </main>
    </header>
</body>
</html>
